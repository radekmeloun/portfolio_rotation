# Symbol Mappings for Data Providers
# Edit this file to fix or update symbol mappings
#
# Each ticker can have:
#   stooq: Symbol or list of symbols to try (e.g., "SXR8.DE" or ["SXR8.DE", "SXR8.F"])
#   yahoo: Symbol or list of symbols to try (e.g., "SXR8.DE" or ["SXR8.DE", "CSPX.L"])
#   notes: Optional description
#
# Leave blank if symbol is unknown - will show "needs mapping" in logs
#
# default_sources: Order of providers to try (optional, defaults to ["stooq", "yahoo"])

default_sources: ["stooq", "yahoo"]

symbols:
  XEON:
    stooq: "XEON.DE"
    yahoo: "XEON.DE"
    notes: "Xtrackers EUR Overnight Rate Swap"

